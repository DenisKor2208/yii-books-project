version: '3.2'
services:
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    volumes:
      - ./:/var/www
    environment:
      - 'DB_PORT=3306'
      - 'DB_HOST=mysql'
      - 'XDG_CONFIG_HOME=/app'
    ports:
      - '8080:80'
    depends_on:
      - php-fpm
    networks:
      - app-network

  php-fpm:
    build:
      context: ./docker/php-fpm
      dockerfile: Dockerfile
    volumes:
      - ./:/var/www
    env_file:
      - .env
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - 'DB_PORT=3306'
      - 'DB_HOST=mysql'
      - 'REDIS_PORT=6379'
      - 'REDIS_HOST=redis'
    depends_on:
      - mysql
    networks:
      - app-network

  php-cli:
    build:
      context: ./
      dockerfile: docker/php-cli.docker
    volumes:
      - ./:/var/www
    env_file:
      - .env
    environment:
      - 'DB_PORT=3306'
      - 'DB_HOST=mysql'
      - 'COMPOSER_MEMORY_LIMIT=-1'
    tty: true
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    volumes:
      - database:/var/lib/mysql
    environment:
      - 'MYSQL_ROOT_PASSWORD=${DB_PASSWORD}'
      - 'MYSQL_USER=${DB_USER}'
      - 'MYSQL_PASSWORD=${DB_PASSWORD}'
      - 'MYSQL_DATABASE=${DB_NAME}'
      - 'MYSQL_GRANT_ALL_PRIVILEGES=yes'
    ports:
      - '33061:3306'
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    environment:
      - PMA_HOST=mysql
      - PMA_USER=${DB_USER}
      - PMA_PASSWORD=${DB_PASSWORD}
      - UPLOAD_LIMIT=64M
    restart: always
    ports:
      - 8081:80
    networks:
      - app-network

volumes:
  database:

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
