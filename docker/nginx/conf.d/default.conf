server {
    listen 80;
    server_name localhost;

    # Корневая директория — публичная папка приложения (там лежит index.php)
    root /var/www/public;
    index index.php;

    charset utf-8;

    # ========== БЕЗОПАСНОСТЬ (ОПЦИОНАЛЬНО) ==========
    # Заголовки из вашего исходного конфига — можно оставить или убрать
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "block-all-mixed-content" always;

    # Логи — для Docker удобно выводить в консоль
    access_log /dev/stdout;
    error_log /dev/stderr;

    # ========== ЗАПРЕТ ДОСТУПА К СЛУЖЕБНЫМ ДИРЕКТОРИЯМ ==========
    # Если вдруг protected/framework/vendor окажутся внутри public — блокируем
    location ~ ^/(protected|framework|vendor|themes/\w+/views) {
        deny all;
        return 404;
    }

    # ========== СТАТИЧЕСКИЕ ФАЙЛЫ ==========
    # Отдаём их напрямую, с кэшированием, не нагружая PHP
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        access_log off;
        log_not_found off;
    }

    # ========== ОСНОВНОЕ ПРАВИЛО МАРШРУТИЗАЦИИ ==========
    # Пытаемся найти файл/папку, иначе направляем на index.php
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ========== ОБРАБОТКА PHP ==========
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Определяем, какой файл обрабатывать:
        # если запрошенный PHP-файл существует — используем его,
        # иначе перенаправляем на index.php (для виртуальных маршрутов)
        set $fsn /index.php;
        if (-f $document_root$fastcgi_script_name) {
            set $fsn $fastcgi_script_name;
        }

        fastcgi_pass php-fpm:9000;   # имя сервиса php-fpm в Docker
        fastcgi_index index.php;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fsn;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fsn;
    }

    # ========== ЗАПРЕТ ДОСТУПА К ФАЙЛАМ, НАЧИНАЮЩИМСЯ С ТОЧКИ ==========
    # .git, .env, .htaccess и т.п. — закрываем
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========== ОПЦИОНАЛЬНО: ЕСЛИ НУЖЕН СПЕЦИАЛЬНЫЙ LOCATION ДЛЯ /docs ==========
    # Раскомментируйте, если требуется (как в вашем исходном конфиге)
    # location /docs {
    #     try_files $uri $uri/;
    # }
}